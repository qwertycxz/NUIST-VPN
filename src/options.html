<!doctype html>
<html lang="zh-Hans">
	<head>
		<meta charset="UTF-8" />
		<meta content="width=device-width, initial-scale=1.0" name="viewport" />
		<script src="options.js" type="module"></script>
		<style href="options.css"></style>
		<title>VPN 设置</title>
	</head>
	<body>
		<main>
			<hgroup>
				<h1>VPN 设置</h1>
				<p>配置您的VPN服务器和加密选项</p>
			</hgroup>
			<blockquote><strong>💡 提示：</strong>点击扩展图标将直接通过选定的VPN服务器访问当前网页。</blockquote>
			<section class="vpn-list" id="vpn-list">
				<h2>VPN 服务器</h2>
				<label>
					<input id="builtin-nuist" name="vpn" type="radio" value="builtin-nuist" />
					<div>
						<h3>NUIST</h3>
						<div>https://client.vpn.nuist.edu.cn</div>
					</div>
				</label>
				<label>
					<input name="vpn" type="radio" value="builtin-njupt" />
					<div>
						<h3>NJUPT</h3>
						<div>https://vpn.njupt.edu.cn:8443</div>
					</div>
				</label>
			</section>
			<section>
				<h2>自定义服务器</h2>
				<form class="custom-form" id="custom-form">
					<label>
						服务器名称
						<input id="custom-name" placeholder="例如: 我的学校" required />
					</label>
					<label>
						VPN 服务器地址
						<input id="custom-origin" placeholder="例如: https://vpn.example.com:8443" required type="url" />
					</label>
					<label>
						加密密钥（Base64编码）
						<input id="custom-key" placeholder="留空使用默认密钥" type="password" />
					</label>
					<button type="submit">添加自定义服务器</button>
				</form>
			</section>
		</main>
		<template id="custom-template">
			<label class="vpn-list">
				<input name="vpn" type="radio" />
				<div>
					<h3></h3>
					<div></div>
				</div>
				<button>删除</button>
			</label>
		</template>
	</body>
</html>
