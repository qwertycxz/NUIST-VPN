<!doctype html>
<html lang="zh-Hans">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="options.js" type="module"></script>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			blockquote {
				background: #ebf5ff;
				border-left: 4px solid #007af5;
				border-radius: 6px;
				color: #333;
				font-size: 13px;
				margin-bottom: 24px;
				padding: 16px;
			}
			blockquote strong {
				color: #007af5;
			}
			body {
				background-color: #f5f7fa;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
				min-height: 100vh;
				padding: 40px 20px;
			}
			button {
				border: none;
				border-radius: 8px;
				cursor: pointer;
				flex: 1;
				font-size: 14px;
				font-weight: 600;
				min-width: 120px;
				padding: 12px 24px;
				transition: all 0.3s ease;
			}
			form {
				background: #f8f9ff;
				border-radius: 8px;
				margin-top: 12px;
				padding: 16px;
			}
			h1 {
				color: #333;
				font-size: 24px;
				margin-bottom: 10px;
				text-align: center;
			}
			h2 {
				align-items: center;
				color: #333;
				display: flex;
				font-size: 16px;
				font-weight: 600;
				margin-bottom: 16px;
			}
			h2::before {
				background: #007af5;
				border-radius: 2px;
				content: '';
				display: inline-block;
				height: 20px;
				margin-right: 12px;
				width: 4px;
			}
			h3 {
				color: #333;
				font-size: 14px;
				font-weight: 600;
			}
			hgroup p {
				color: #666;
				font-size: 14px;
				margin-bottom: 30px;
				text-align: center;
			}
			main {
				background: white;
				border-radius: 12px;
				box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
				margin: 0 auto;
				max-width: 600px;
				padding: 40px;
			}
			section {
				border-bottom: 1px solid #eee;
				margin-bottom: 24px;
				padding-bottom: 24px;
			}
			section:last-of-type {
				border-bottom: none;
			}
			.custom-form button {
				background: #52c41a;
				color: white;
			}
			.custom-form button:hover {
				background: #73d13d;
			}
			.custom-form input {
				border: 1px solid #d9d9d9;
				border-radius: 6px;
				font-size: 14px;
				margin-top: 4px;
				padding: 10px 12px;
				transition: all 0.3s ease;
				width: 100%;
			}
			.custom-form input:focus {
				border-color: #007af5;
				box-shadow: 0 0 0 2px rgba(0, 122, 245, 0.2);
				outline: none;
			}
			.custom-form label {
				color: #333;
				display: block;
				font-size: 14px;
				font-weight: 600;
				margin-bottom: 16px;
			}
			.vpn-list button {
				background: #ff4d4f;
				border: none;
				border-radius: 4px;
				color: white;
				cursor: pointer;
				flex: none;
				font-size: 12px;
				min-width: auto;
				padding: 6px 12px;
				transition: all 0.3s ease;
			}
			.vpn-list button:hover {
				background: #ff7875;
			}
			.vpn-list div {
				flex: 1;
				transition: color 0.3s ease;
			}
			.vpn-list div div {
				color: #999;
				font-family: 'Courier New', monospace;
				font-size: 12px;
				margin-top: 4px;
			}
			.vpn-list input {
				accent-color: #007af5;
				cursor: pointer;
				height: 18px;
				margin-right: 12px;
				width: 18px;
			}
			.vpn-list input:checked {
				color: #007af5;
				font-weight: 600;
			}
			.vpn-list label {
				align-items: center;
				border: 1px solid #e8e8e8;
				border-radius: 8px;
				cursor: pointer;
				display: flex;
				margin-bottom: 8px;
				padding: 12px;
				transition: all 0.3s ease;
			}
			.vpn-list label:hover {
				background-color: #f0f7ff;
				border-color: #007af5;
			}
			@media (prefers-color-scheme: dark) {
				blockquote {
					background: #1a2634;
					color: #ccc;
				}
				blockquote strong {
					color: #4dabf7;
				}
				body {
					background-color: #121212;
				}
				form {
					background: #252525;
				}
				h1,
				h2,
				h3,
				.custom-form label {
					color: #e0e0e0;
				}
				hgroup p {
					color: #888;
				}
				main {
					background: #1e1e1e;
					box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
				}
				section {
					border-bottom-color: #333;
				}
				.custom-form input {
					background-color: #2d2d2d;
					border-color: #444;
					color: #e0e0e0;
				}
				.custom-form input:focus {
					border-color: #007af5;
				}
				.vpn-list div div {
					color: #777;
				}
				.vpn-list label {
					border-color: #333;
				}
				.vpn-list label:hover {
					background-color: #252525;
					border-color: #007af5;
				}
			}
		</style>
		<title>VPN 设置</title>
	</head>
	<body>
		<main>
			<hgroup>
				<h1>VPN 设置</h1>
				<p>配置您的VPN服务器和加密选项</p>
			</hgroup>
			<blockquote><strong>💡 提示：</strong>点击扩展图标将直接通过选定的VPN服务器访问当前网页。</blockquote>
			<section class="vpn-list" id="vpn-list">
				<h2>VPN 服务器</h2>
				<label>
					<input id="builtin-nuist" name="vpn" type="radio" value="builtin-nuist" />
					<div>
						<h3>NUIST</h3>
						<div>https://client.vpn.nuist.edu.cn</div>
					</div>
				</label>
				<label>
					<input name="vpn" type="radio" value="builtin-njupt" />
					<div>
						<h3>NJUPT</h3>
						<div>https://vpn.njupt.edu.cn:8443</div>
					</div>
				</label>
			</section>
			<section>
				<h2>自定义服务器</h2>
				<form class="custom-form" id="custom-form">
					<label>
						服务器名称
						<input id="custom-name" placeholder="例如: 我的学校" required />
					</label>
					<label>
						VPN 服务器地址
						<input id="custom-origin" placeholder="例如: https://vpn.example.com:8443" required type="url" />
					</label>
					<label>
						加密密钥（Base64编码）
						<input id="custom-key" placeholder="留空使用默认密钥" type="password" />
					</label>
					<button type="submit">添加自定义服务器</button>
				</form>
			</section>
		</main>
		<template id="custom-template">
			<label class="vpn-list">
				<input name="vpn" type="radio" />
				<div>
					<h3></h3>
					<div></div>
				</div>
				<button>删除</button>
			</label>
		</template>
	</body>
</html>
