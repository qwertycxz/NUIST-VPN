<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN 设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .option-group {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e0e0e0;
        }

        .option-group:last-of-type {
            border-bottom: none;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 12px;
            border-radius: 2px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-label:hover {
            border-color: #667eea;
            background-color: #f8f9ff;
        }

        .option-label input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .option-label input[type="radio"]:checked+.label-content {
            color: #667eea;
            font-weight: 600;
        }

        .label-content {
            flex: 1;
            transition: color 0.3s ease;
        }

        .server-name {
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }

        .server-url {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .custom-server-section {
            background: #f8f9ff;
            padding: 16px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .custom-servers-list {
            margin-top: 16px;
            max-height: 300px;
            overflow-y: auto;
        }

        .custom-server-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .custom-server-item-info {
            flex: 1;
        }

        .custom-server-item-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .custom-server-item-url {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: #ff5252;
        }

        .encryption-section {
            background: #f8f9ff;
            padding: 16px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        .btn-add {
            background: #28a745;
            color: white;
        }

        .btn-add:hover {
            background: #218838;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .btn-reset:hover {
            background: #e8e8e8;
        }

        .status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
            border: 1px solid #bee5eb;
        }

        .info-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 16px;
            margin-bottom: 24px;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
        }

        .info-box strong {
            color: #667eea;
        }

        .collapse-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .collapse-content.show {
            max-height: 500px;
        }

        .collapse-toggle {
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 VPN 设置</h1>
        <p class="subtitle">配置您的VPN服务器和加密选项</p>

        <div class="info-box">
            <strong>💡 提示：</strong>点击扩展图标将直接通过选定的VPN服务器访问当前网页。
        </div>

        <!-- 内置服务器选择 -->
        <div class="option-group">
            <div class="section-title">内置 VPN 服务器</div>

            <label class="option-label">
                <input type="radio" name="vpnServer" value="nuist" checked>
                <div class="label-content">
                    <div class="server-name">NUIST</div>
                    <div class="server-url">https://client.vpn.nuist.edu.cn</div>
                </div>
            </label>

            <label class="option-label">
                <input type="radio" name="vpnServer" value="njupt">
                <div class="label-content">
                    <div class="server-name">NJUPT</div>
                    <div class="server-url">https://vpn.njupt.edu.cn:8443</div>
                </div>
            </label>

        </div>

        <!-- 自定义服务器 -->
        <div class="option-group">
            <div class="section-title">自定义服务器</div>

            <div class="custom-server-section">
                <div class="form-group">
                    <label class="form-label" for="customServerName">服务器名称</label>
                    <input type="text" id="customServerName" class="form-input" placeholder="例如: 我的学校">
                </div>

                <div class="form-group">
                    <label class="form-label" for="customServerUrl">VPN 服务器地址</label>
                    <input type="text" id="customServerUrl" class="form-input"
                        placeholder="例如: https://vpn.example.com:8443">
                </div>

                <div class="form-group">
                    <label class="form-label" for="customServerKey">加密密钥</label>
                    <input type="password" id="customServerKey" class="form-input" placeholder="留空使用默认密钥">
                </div>

                <button class="btn-add" id="addServerBtn">添加自定义服务器</button>
            </div>

            <div class="custom-servers-list" id="customServersList"></div>

            <!-- 自定义服务器项模板 -->
            <template id="custom-server-template">
                <div class="custom-server-item">
                    <input type="radio" name="vpnServer">
                    <div class="custom-server-item-info">
                        <div class="custom-server-item-name"></div>
                        <div class="custom-server-item-url"></div>
                    </div>
                    <button class="btn-delete">删除</button>
                </div>
            </template>
        </div>

        <!-- 全局加密密钥设置 -->
        <div class="option-group">
            <div class="section-title collapse-toggle" id="encryptionToggle">🔑 高级：加密密钥设置</div>

            <div class="collapse-content" id="encryptionContent">
                <div class="encryption-section">
                    <p style="font-size: 12px; color: #666; margin-bottom: 12px;">
                        仅当您了解加密机制时才修改此项。默认密钥可用于自带服务器。
                    </p>

                    <div class="form-group">
                        <label class="form-label" for="globalEncryptionKey">全局加密密钥</label>
                        <input type="password" id="globalEncryptionKey" class="form-input">
                    </div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-save" id="saveBtn">保存设置</button>
            <button class="btn-reset" id="resetBtn">恢复默认</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script src="options.js"></script>
</body>

</html>
